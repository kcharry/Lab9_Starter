<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lab 9</title>

  <style>
    button {
      margin: 3px;
    }

    button:hover {
      cursor: pointer;
    }

    #first-num,
    #second-num {
      width: 60px;
    }

    output {
      border: 1px solid gray;
      display: block;
      height: 18px;
      margin-top: 5px;
      padding: 5px;
      width: 240px;
    }

    main {
      width: 800px;
    }

    #error-btns {
      column-gap: 5px;
      display: flex;
      flex-wrap: wrap;
      margin-top: 30px;
      row-gap: 5px;
    }

    #error-btns>* {
      padding: 8px 2px;
      width: 122px;
    }
  </style>
</head>

<body>
  <main>
    <form>
      <fieldset>
        <legend>Error Calculator</legend>
        <input name="first-num" id="first-num" />
        <select name="operator" id="operator">
          <option>+</option>
          <option>-</option>
          <option>*</option>
          <option>/</option>
        </select>
        <input name="second-num" id="second-num" />
        <button id="calculate">Calculate</button>
        <br />
        <output></output>
      </fieldset>
    </form>

    <section id="error-btns">
      <button>Console Log</button>
      <button>Console Error</button>
      <button>Console Count</button>
      <button>Console Warn</button>
      <button>Console Assert</button>
      <button>Console Clear</button>
      <button>Console Dir</button>
      <button>Console dirxml</button>
      <button>Console Group Start</button>
      <button>Console Group End</button>
      <button>Console Table</button>
      <button>Start Timer</button>
      <button>End Timer</button>
      <button>Console Trace</button>
      <button>Trigger a Global Error</button>
    </section>
  </main>

  <script>
    class DivideError extends Error {
      constructor(message) {
        super(message);
        this.name = "DivideError";
      }
    }

    let form = document.querySelector('form');
    form.addEventListener('submit', e => {
      e.preventDefault();
      let output = document.querySelector('output');
      let firstNum = document.querySelector('#first-num').value;
      let secondNum = document.querySelector('#second-num').value;
      let operator = document.querySelector('#operator').value;
      
      // output.innerHTML = eval(`${firstNum} ${operator} ${secondNum}`);
      try {
        if (firstNum === "" || secondNum ==="") {
          throw new Error("Both inputs required");
        }

        if (operator === '/' && secondNum === "0") {
          throw new DivideError("Cannot divide by zero");
        }

        output.innerHTML = eval(`${firstNum} ${operator} ${secondNum}`);
      } catch (error) {
        console.error(error);
        output.innerHTML = error.message;
      } finally {
        console.log("Calculation attempted.");
      }
    });

    let errorBtns = Array.from(document.querySelectorAll('#error-btns > button'));

    // Start your code here
    // You may move this JS to another file if you wish
    window.onerror = function(message, source, lineno, colno, error) {
      console.log("global error!");
      console.error(error);
      return true;
    };

    errorBtns[0].addEventListener('click', () => {
      console.log("Testing console.log()");
    });

    errorBtns[1].addEventListener('click', () => {
      console.error("Testing console.error()");
    });

    errorBtns[2].addEventListener('click', () => {
      console.count("Testing console.count()");
    });

    errorBtns[3].addEventListener('click', () => {
      console.warn("Testing console.warn()");
    });

    errorBtns[4].addEventListener('click', () => {
      console.assert(false, "Testing console.assert()");
    });

    errorBtns[5].addEventListener('click', () => {
      console.clear();
    });

    errorBtns[6].addEventListener('click', (e) => {
      console.dir(e.target);
    });

    errorBtns[7].addEventListener('click', (e) => {
      console.dirxml(e.target);
    });

    errorBtns[8].addEventListener('click', () => {
      console.group("Test Group");
      console.log("test 1");
      console.log("test 2");
    });

    errorBtns[9].addEventListener('click', () => {
      console.groupEnd();
    });

    errorBtns[10].addEventListener('click', () => {
      const students = [
        { name: "Alice", major: "Computer Science", grade: "A" },
        { name: "Bob", major: "Math", grade: "B+" },
        { name: "Charlie", major: "Physics", grade: "A-" },
        { name: "Diana", major: "Biology", grade: "B" }
      ];

      console.table(students);
    });

    errorBtns[11].addEventListener('click', () => {
      console.time("Test Timer)"); 
    });

    errorBtns[12].addEventListener('click', () => {
      console.timeEnd("Test Timer)");
    });
    
    errorBtns[13].addEventListener('click', () => {
      console.trace("Testing console.trace()");
    });
    
    errorBtns[14].addEventListener('click', () => {
      aintGonnaWork('lol');
    });

  </script>

</body>

</html>
